replicaCount: 2

image:
  pullPolicy: Always

resources:
  limits:
    cpu: 300m
    memory: 1Gi
  
securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70